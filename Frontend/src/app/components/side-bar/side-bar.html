<mat-sidenav-container class="sidenav-container">

  <!-- SIDEBAR -->
  <mat-sidenav #drawer mode="side" opened="true" class="sidenav">

<span class="title">
      <mat-icon>restaurant</mat-icon>
      <span style="margin-left:8px; margin-bottom:50px">{{'Restaurant Manager'| translate }}</span>
      </span>
    <mat-nav-list>


      <a mat-list-item routerLink="">
        <mat-icon>store</mat-icon>
        <span class="elt_nav">{{'Restaurant'| translate }}</span>
      </a>

      <a mat-list-item routerLink="/restaurants/add">
        <mat-icon>add_circle</mat-icon>
        <span class="elt_nav">{{'Add Restaurant'| translate }}</span>
      </a>

      <a mat-list-item routerLink="restaurants/soft" >
        <mat-icon>delete_outline</mat-icon>
        <span class="elt_nav">{{ 'Soft deleted restaurants' | translate }}</span>
      </a>

      <a mat-list-item routerLink="/settings" >
        <mat-icon class="elt_nav">settings</mat-icon>
        <span class="elt_nav">{{ 'settings' | translate }}</span>
      </a>

    </mat-nav-list>

  </mat-sidenav>

  <!-- CONTENT -->
  <mat-sidenav-content>

    <mat-toolbar color="primary" class="toolbar">

      <button mat-icon-button (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>


      <span class="spacer"></span>
      <a routerLink="../">
        <mat-icon class="arrow_back" style="color:#0F515F;">arrow_back</mat-icon>
      </a>

    </mat-toolbar>

    <!-- PAGE CONTENT -->
    <div class="content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
